name: Deploy to Vercel

# Deploys the site to Vercel production whenever main updates, so the
# live site never drifts behind the repo. Also runnable on demand from
# the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Vercel project + org identifiers are not secrets (they ship in
# .vercel/project.json). Only VERCEL_TOKEN must be added as a repo secret:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name: VERCEL_TOKEN   Value: a token from https://vercel.com/account/tokens
env:
  VERCEL_ORG_ID: team_L2NDeoswU2HM52rYFxanlsjL
  VERCEL_PROJECT_ID: prj_oBQBwnYQDLkJyXk6q80dbMRtglK6

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g vercel@latest
      # `vercel pull` fetches the project's saved Build & Output settings
      # (framework, root directory, etc.) so the CI build matches the
      # dashboard-configured deploy exactly.
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
